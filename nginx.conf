# ─────────────────────────────────────────────────────────────
#  AI Activation Studio — nginx server block
#  Listens on 8080 (Cloud Run / App Runner / k8s friendly).
# ─────────────────────────────────────────────────────────────

server {
  listen       8080 default_server;
  listen       [::]:8080 default_server;
  server_name  _;
  root         /usr/share/nginx/html;
  index        index.html;

  # ── Security headers (applied to every response, including errors) ──
  add_header X-Content-Type-Options "nosniff"                      always;
  add_header X-Frame-Options        "SAMEORIGIN"                   always;
  add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy     "interest-cohort=()"           always;

  # ── Health endpoint (used by HEALTHCHECK + load balancers) ──
  location = /healthz {
    access_log  off;
    default_type text/plain;
    return 200 "ok\n";
  }

  # ── Hashable static assets: 1-year immutable cache ──
  location ~* \.(css|js|woff2?|ttf|otf|eot|png|jpe?g|gif|webp|svg|ico)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
    access_log off;
    try_files $uri =404;
  }

  # ── HTML: never cache (always pick up the latest deploy) ──
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  }

  # ── Catch-all: every path serves index.html (SPA-style routing) ──
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  }

  # ── Compression ──
  gzip            on;
  gzip_vary       on;
  gzip_min_length 512;
  gzip_proxied    any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    application/manifest+json;

  # ── Hide nginx version in Server header ──
  server_tokens off;
}
