services:
  studio:
    build: .
    image: gtm-ai-trainer-studio:latest
    container_name: gtm-ai-trainer-studio
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=64m
      - /var/run:size=8m
    security_opt:
      - no-new-privileges:true
